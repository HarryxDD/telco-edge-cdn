version: '3.8'

services:
  origin:
    build:
      context: ../../services/origin
    container_name: telco-origin
    ports:
      - "${ORIGIN_PORT:-8443}:8443"
    env_file:
      - ../../services/origin/.env
    volumes:
      - origin-uploads:/app/uploads
      - origin-hls:/app/hls
    networks:
      - cdn-network
    environment:
      - USE_TLS=false
    command: ["./origin"]

  cache-node:
    build:
      context: ../../services/cache-node
    container_name: telco-cache-1
    ports:
      - "${CACHE_NODE_PORT:-8081}:8081"
    env_file:
      - ../../services/cache-node/.env
    environment:
      - ORIGIN_URL=http://origin:8443
    volumes:
      - cache-data:/app/data
    depends_on:
      - origin
    networks:
      - cdn-network

  load-balancer:
    build:
      context: ../../services/load-balancer
    container_name: telco-lb
    ports:
      - "${LOAD_BALANCER_PORT:-8090}:8090"
    env_file:
      - ../../services/load-balancer/.env
    environment:
      - CACHE_NODES=cache-1:http://cache-node:8081
    depends_on:
      - cache-node
    networks:
      - cdn-network

networks:
  cdn-network:
    driver: bridge

volumes:
  origin-uploads:
  origin-hls:
  cache-data:
