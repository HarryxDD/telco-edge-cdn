global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: "cache-nodes"
    static_configs:
      - targets:
          - "cache-1:8081"
          - "cache-2:8082"
          - "cache-3:8083"
    metrics_path: /metrics

  - job_name: "ml-aggregator"
    static_configs:
      - targets:
          - "ml-service:8092"
    metrics_path: /metrics